<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- tailwind + daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] py-20">
    <div class="p-8 max-w-md mx-auto bg-white shadow-md rounded-lg">
      <div class="text-center">
        <div class="flex justify-center">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <h2 class="font-semibold text-2xl mt-6">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <div class="form pt-6">
        <label class="label font-medium text-[#080808]">Username</label>
        <input
          id="inputUsername"
          type="text"
          class="input border-1 border-[#E4E4E7] rounded-lg w-full"
          placeholder="Enter Username"
        />
        <p class="text-primary mb-4">Default: admin</p>

        <label class="label font-medium text-[#080808]">Password</label>
        <input
          id="inputPassword"
          type="password"
          class="input border-1 border-[#E4E4E7] rounded-lg w-full"
          placeholder="Enter Password"
        />
        <p class="text-primary">Default: admin123</p>

        <button id="login-btn" class="btn bg-[#4A00FF] text-white font-bold mt-6 rounded-lg w-full">
          Sign In
        </button>

        <div class="divider my-6">
          <span>OR</span>
        </div>

        <p class="mb-6 text-[#64748B] text-center">Demo Credentials:</p>

        <div class="py-6 bg-[#F8FAFC] text-center rounded-lg">
          <p><span class="font-bold">Username: </span>admin</p>
          <p><span class="font-bold">Password: </span>admin123</p>
        </div>
      </div>
      <script src="./scripts/login.js"></script>
    </div>
  </body>
</html>
